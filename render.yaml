# render.yaml
services:
  - type: web
    name: marketing-xixa-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PUBLIC_BOT_TOKEN
        sync: false
      - key: ADMIN_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: marketing-xixa-db
          property: connectionString
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_ENV
        value: production

databases:
  - name: marketing-xixa-db
    databaseName: xixa00marketingoff
    plan: free
